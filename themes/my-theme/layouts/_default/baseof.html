<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - NetSpace</title>
    <style>
        /* 1. 亮色模式变量（默认） */
        :root { 
            --bg-color: #ffffff; 
            --sidebar-bg: #f8f9fa; 
            --text-main: #2c3e50; 
            --text-muted: #6c757d; 
            --accent-color: #0366d6; 
            --border-color: #e1e4e8; 
            --hover-bg: #f1f8ff; 
            --card-bg: #ffffff; /* 专门给卡片用的背景色 */
            --table-stripe: #f8f9fa; /* 👈 新增：亮色模式下的表格斑马线背景 */
        }

        /* 2. 暗色模式变量（系统切换到深色时自动生效） */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;       /* 纯净的深色背景 */
                --sidebar-bg: #161b22;     /* 稍微亮一点的侧边栏 */
                --text-main: #c9d1d9;      /* 柔和的亮灰色文字 */
                --text-muted: #8b949e;     /* 较暗的说明文字 */
                --accent-color: #58a6ff;   /* 深色模式下的亮蓝色 */
                --border-color: #30363d;   /* 极暗的边框 */
                --hover-bg: #21262d;       /* 悬浮高亮 */
                --card-bg: #0d1117;        /* 深色卡片背景 */
                --table-stripe: #1c2128; /* 👈 新增：暗色模式下的表格斑马线背景 */
            }
        }

        /* 增加 transition 动画，让昼夜切换时有丝滑的渐变 */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; min-height: 100vh; background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s, color 0.3s; }
        
        /* 3. 修改侧边栏：宽度收窄至 200px，采用 flex 上下两端对齐 */
        .sidebar { width: 160px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 2rem 1.2rem; display: flex; flex-direction: column; justify-content: space-between; transition: background-color 0.3s, border-color 0.3s; }
        
        .sidebar-top { display: flex; flex-direction: column; }
        .sidebar-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 2rem; color: var(--text-main); text-align: center; }
        .nav-links { list-style: none; padding: 0; margin: 0; }
        .nav-links li { margin-bottom: 0.5rem; }
        .nav-links a { text-decoration: none; color: var(--text-main); display: block; padding: 0.6rem 0.8rem; border-radius: 6px; transition: all 0.2s ease; font-size: 0.95rem; }
        .nav-links a:hover { background-color: var(--hover-bg); color: var(--accent-color); font-weight: 500; }
        
        /* 4. 全新的页脚：固定在侧边栏底部，字号缩小，弱化存在感 */
        .sidebar-footer { font-size: 0.75rem; color: var(--text-muted); text-align: center; border-top: 1px dashed var(--border-color); padding-top: 1rem; line-height: 1.8; }
        .sidebar-footer a { color: var(--accent-color); text-decoration: none; }

        /* 右侧主内容区 */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
        .content { flex: 1; padding: 2rem 4rem; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        /* 列表和文章通用样式 */
        .post-item { border-bottom: 1px solid var(--border-color); padding: 1.5rem 0; transition: border-color 0.3s; }
        .post-title { font-size: 1.4rem; color: var(--accent-color); margin: 0 0 0.5rem 0; transition: color 0.2s;}
        .post-title:hover { opacity: 0.8; }
        .post-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem; }
        .markdown-content { line-height: 1.8; font-size: 1.05rem; }
        .markdown-content h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 0.3rem; margin-top: 2rem; }
        /* 代码块的深色适应 */
        /* 响应式表格：在大屏幕撑满，小屏幕可滑动且不溢出 */
        .markdown-content table {
            display: table; /* 恢复表格特性 */
            width: 100%;
            max-width: 100%; /* 严禁超过父容器 */
            border-collapse: collapse;
            margin: 2rem 0;
            overflow-x: auto;
            word-break: break-all; /* 允许单元格内文字换行 */
        }

        /* 移动端优化：给表格外层加一个自动滚动的“保护壳” */
        @media (max-width: 768px) {
            .markdown-content table {
                display: block; /* 手机端变成块级元素，激活滚动 */
                -webkit-overflow-scrolling: touch; /* 丝滑滚动体验 */
            }
        }

        .markdown-content th, .markdown-content td {
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            min-width: 80px; /* 保证最小可读性，不至于挤成一团 */
        }
        .markdown-content th {
            background-color: var(--sidebar-bg); /* 表头使用侧边栏同款底色 */
            font-weight: 600;
        }
        .markdown-content tr:nth-child(even) {
            background-color: var(--table-stripe); /* 偶数行显示斑马线 */
        }
        .markdown-content code { background: var(--hover-bg); padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        
        /* 手机端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: auto; border-right: none; border-bottom: 1px solid var(--border-color); padding: 1rem; }
            .nav-links { display: flex; justify-content: space-between; overflow-x: auto; white-space: nowrap; margin-bottom: 0; }
            .nav-links a { padding: 0.5rem; }
            /* 手机端顶部空间宝贵，自动隐藏页脚 */
            .sidebar-footer { display: none; }
            .content { padding: 1.5rem; }
            .main-wrapper { height: auto; overflow-y: visible; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <!-- 侧边栏上半部分：导航 -->
        <div class="sidebar-top">
            <div class="sidebar-title">👨‍💻 NetSpace</div>
            <ul class="nav-links">
                <li><a href="/">🏠 首页</a></li>
                <li><a href="/blog/">📝 博客文章</a></li>
                <li><a href="/network/">⚙️ 网络折腾</a></li>
                <li><a href="/tools/">🚀 实用工具</a></li>
            </ul>
        </div>
        
        <!-- 侧边栏下半部分：页脚 -->
        <footer class="sidebar-footer">
            <p>
                GitHub: <a href="https://github.com/aantzhao" target="_blank">@aantzhao</a><br>
                Powered by CF & HUGE & GitHub
            </p>
        </footer>
    </aside>

    <div class="main-wrapper">
        <main class="content">
            {{ block "main" . }}{{ end }}
        </main>
    </div>
</body>
</html>
