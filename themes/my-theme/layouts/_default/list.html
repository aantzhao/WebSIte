{{ define "main" }}
    <h2 style="margin-bottom: 2rem;">📁 {{ .Title }} 列表</h2>
    
    <!-- 自动遍历当前栏目下的所有文章 -->
    {{ range .Pages }}
    <div class="post-item">
        <a href="{{ .Permalink }}" style="text-decoration: none;">
            <h3 class="post-title">{{ .Title }}</h3>
        </a>
        <div class="post-meta">🗓️ {{ .Date.Format "2006-01-02" }} | ⏱️ 阅读 {{ .ReadingTime }} 分钟</div>
        <p style="color:var(--text-muted); line-height: 1.6; margin: 0;">{{ .Summary }}</p>
    </div>
    {{ else }}
    <p style="color:var(--text-muted);">本栏目暂无内容。</p>
    {{ end }}
{{ end }}
