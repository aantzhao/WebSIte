{{ define "main" }}
    <h1>欢迎来到我的主页 👋</h1>
    <p style="color:var(--text-muted); line-height: 1.6; margin-bottom: 3rem;">
        这里是我的个人数字花园。我是一名网络专业人士，喜欢折腾路由器、交换机、以及各种 Android 底层系统。<br>
        点击左侧菜单浏览我的文章、项目和工具集。
    </p>

    <h2>🌟 全站最新动态</h2>
    <!-- 自动抓取全站最新的 3 篇文章展示在首页 -->
    {{ range first 3 .Site.RegularPages }}
        <div class="post-item">
            <a href="{{ .Permalink }}" style="text-decoration: none;">
                <h3 class="post-title">{{ .Title }}</h3>
            </a>
            <div class="post-meta">🗓️ {{ .Date.Format "2006-01-02" }} | 📁 栏目: {{ .Section }}</div>
        </div>
    {{ end }}
{{ end }}
